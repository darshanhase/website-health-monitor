<!DOCTYPE html>
<html>
<head>
    <title>Monitoring History</title>
</head>
<body>
    <h1>Monitoring History</h1>
    <table border="1" cellpadding="5">
        <tr>
            <th>URL</th>
            <th>Status</th>
            <th>Latency (ms)</th>
            <th>Checked At</th>
        </tr>
        {% for url, status, latency, checked_at in results %}
        <tr>
            <td>{{ url }}</td>
            <td>{{ status }}</td>
            <td>{{ latency }}</td>
            <td>{{ checked_at }}</td>
        </tr>
        {% endfor %}
    </table>
    <p><a href="{{ url_for('index') }}">Back to Home</a></p>
</body>
</html>
